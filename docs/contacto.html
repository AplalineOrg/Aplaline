<!DOCTYPE html>
<html>
    <link rel="stylesheet" type="text/css" href="..\css\contact.css">


<body>

    <div class="overlay">
        <a href="index.html" class="logo">
          <img src="../imagenes/LOGO.png" alt="Image Button">
        </a>
        <div class="menu">
          <a href="nosotron.html"><span>Nosotros</span></a>
          <a href="contacto.html"><span>Contactanos</span></a>
          <a href="preguntas.html"><span>Preguntas frecuentes</span></a>
        </div>
      </div>
      
        <div class="contact-form">
            <form action="https://formsubmit.co/bdd25f4621c5a2a506e4f5a37c980bc3" method="post">
              <label for="name">Nombre:</label>
              <input type="text" id="name" name="name" required>
          
              <label for="last-name">Apellidos:</label>
              <input type="text" id="last-name" name="last-name" required>
          
              <label for="whatsapp">WhatsApp:</label>
              <input type="tel" id="whatsapp" name="whatsapp" required>
          
              <label for="email">Email:</label>
              <input type="email" id="email" name="email" required>
          
              <label for="office-number">Numero de Oficina:</label>
              <input type="tel" id="office-number" name="office-number" required>
          
              <label for="reason">Rason de contacto:</label>
              <select id="reason" name="reason" required>
                <option value="">Selecciona razón</option>
                <option value="Solicitud de credito personal">Informacion General de servicios</option>
                <option value="Solicitud de credito para negocio">Agendar una cita</option>
                <option value="Credito sobre mi auto">Pregunta o duda</option>
                <option value="Preguntas sobre mi credito actual">Quiero empezar ya con mi servicio de marketing</option>
                <option value="Otra solicitud">Otra solicitud</option>
              </select>
          
              <label for="message">Message:</label>
              <textarea id="message" name="message" required></textarea>
          
              <input type="submit" value="Submit">
            </form>
    
    
    
    
    
        
      </div>
    </body>




</html>
